apiVersion: apps/v1
kind: Deployment
metadata:
  name: bgp-routing-operator
  namespace: bgp-routing-system
  labels:
    app.kubernetes.io/name: bgp-routing-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bgp-routing-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bgp-routing-operator
    spec:
      serviceAccountName: bgp-routing-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: __BGP_OPERATOR_IMAGE__
          imagePullPolicy: Always
          args:
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=0
            - --metrics-secure=false
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/run/secrets/gcp/credential-config.json
          ports:
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: gcp-credentials
              mountPath: /var/run/secrets/gcp
              readOnly: true
            - name: k8s-sa-wif-token
              mountPath: /var/run/secrets/tokens/gcp-wif
              readOnly: true
      volumes:
        - name: gcp-credentials
          secret:
            secretName: bgp-routing-gcp-credentials
        - name: k8s-sa-wif-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 3600
                  audience: "__BGP_OPERATOR_WIF_AUDIENCE__"
