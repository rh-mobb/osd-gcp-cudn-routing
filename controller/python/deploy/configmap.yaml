apiVersion: v1
kind: ConfigMap
metadata:
  name: bgp-routing-controller
  namespace: bgp-routing-system
  labels:
    app.kubernetes.io/name: bgp-routing-controller
data:
  # Required — match your Terraform outputs
  GCP_PROJECT: "CHANGEME"
  CLUSTER_NAME: "CHANGEME"
  CLOUD_ROUTER_NAME: "CHANGEME-cudn-cr"
  CLOUD_ROUTER_REGION: "us-central1"
  NCC_HUB_NAME: "CHANGEME-ncc-hub"
  # Controller creates spokes named {NCC_SPOKE_PREFIX}-0, {NCC_SPOKE_PREFIX}-1, … (≤8 instances per spoke).
  NCC_SPOKE_PREFIX: "CHANGEME-ra-spoke"

  # FRR ASN must match cluster_bgp_routing/variables.tf frr_asn
  FRR_ASN: "65003"

  # NCC spoke site_to_site_data_transfer (must match Terraform ncc_spoke_site_to_site_data_transfer)
  NCC_SPOKE_SITE_TO_SITE: "false"

  # Worker candidate pool (must not include infra — controller excludes INFRA_EXCLUDE_LABEL_KEY).
  # Use a custom NODE_LABEL_KEY / NODE_LABEL_VALUE to limit which nodes become BGP routers.
  NODE_LABEL_KEY: "node-role.kubernetes.io/worker"
  NODE_LABEL_VALUE: ""

  ROUTER_LABEL_KEY: "node-role.kubernetes.io/bgp-router"
  INFRA_EXCLUDE_LABEL_KEY: "node-role.kubernetes.io/infra"

  # Reconciliation tuning
  RECONCILE_INTERVAL_SECONDS: "60"
  DEBOUNCE_SECONDS: "5"
