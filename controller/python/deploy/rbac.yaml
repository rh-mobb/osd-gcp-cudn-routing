apiVersion: v1
kind: ServiceAccount
metadata:
  name: bgp-routing-controller
  namespace: bgp-routing-system
  labels:
    app.kubernetes.io/name: bgp-routing-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bgp-routing-controller
  labels:
    app.kubernetes.io/name: bgp-routing-controller
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    # update: controller uses PUT (Update) for node labels; patch alone is not enough.
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["frrk8s.metallb.io"]
    resources: ["frrconfigurations"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["k8s.ovn.org"]
    resources: ["clusteruserdefinednetworks", "routeadvertisements"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # kopf needs to patch its own status store (peering); scope to the controller namespace
  - apiGroups: ["kopf.dev"]
    resources: ["clusterkopfpeerings"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bgp-routing-controller
  labels:
    app.kubernetes.io/name: bgp-routing-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bgp-routing-controller
subjects:
  - kind: ServiceAccount
    name: bgp-routing-controller
    namespace: bgp-routing-system
