apiVersion: apps/v1
kind: Deployment
metadata:
  name: bgp-routing-controller
  namespace: bgp-routing-system
  labels:
    app.kubernetes.io/name: bgp-routing-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bgp-routing-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bgp-routing-controller
    spec:
      serviceAccountName: bgp-routing-controller
      containers:
        - name: controller
          # Same namespace ImageStream (after oc start-build --from-dir).
          image: image-registry.openshift-image-registry.svc:5000/bgp-routing-system/bgp-routing-controller:latest
          envFrom:
            - configMapRef:
                name: bgp-routing-controller
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/run/secrets/gcp/credential-config.json
          volumeMounts:
            - name: gcp-credentials
              mountPath: /var/run/secrets/gcp
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: gcp-credentials
          secret:
            secretName: bgp-routing-gcp-credentials
